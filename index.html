<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monitorr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="receiver.css">
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
</head>
<body>

  <!-- ── Player ─────────────────────────────────────────── -->
  <div id="mr-player" style="display:none">
    <video id="mr-video"></video>

    <!-- Loading spinner -->
    <div id="mr-spinner" style="display:none">
      <div class="mr-spinner-ring"></div>
    </div>

    <!-- Bottom overlay -->
    <div id="mr-overlay">
      <div class="mr-gradient"></div>
      <div class="mr-bottom">

        <!-- Seek bar -->
        <div class="mr-seek-row">
          <span id="mr-time-left" class="mr-time">0:00</span>
          <div class="mr-seek-track">
            <div id="mr-seek-buffered" class="mr-seek-buffered"></div>
            <div id="mr-seek-played" class="mr-seek-played"></div>
          </div>
          <span id="mr-time-right" class="mr-time">--:--</span>
        </div>

        <!-- Controls + metadata row -->
        <div class="mr-controls-row">
          <!-- Poster + metadata -->
          <img id="mr-poster" class="mr-poster" src="" alt="" style="display:none">
          <div class="mr-meta">
            <div id="mr-title" class="mr-title"></div>
            <div id="mr-subtitle" class="mr-subtitle"></div>
          </div>

          <!-- Control buttons -->
          <div class="mr-buttons">
            <button id="mr-btn-skip-prev" class="mr-btn" style="display:none" title="Previous episode">
              <span class="bi bi-skip-start-fill"></span>
            </button>
            <button id="mr-btn-cc" class="mr-btn" style="display:none" title="Subtitles">
              <span class="bi bi-badge-cc-fill"></span>
              <span id="mr-cc-label" class="mr-cc-label"></span>
            </button>
            <button id="mr-btn-skip-next" class="mr-btn" style="display:none" title="Next episode">
              <span class="bi bi-skip-end-fill"></span>
            </button>
          </div>

          <!-- Brand -->
          <div class="mr-brand">
            <span class="mr-brand-name">Monitorr</span>
            <span class="mr-brand-ver">v0.3.3</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Idle Screen ────────────────────────────────────── -->
  <div id="mr-idle">
    <div class="idle-brand">Monitorr</div>
    <div class="idle-status">Ready to cast</div>
    <div class="idle-version">v0.3.3</div>
  </div>

  <script src="receiver.js"></script>
</body>
</html>
