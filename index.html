<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monitorr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="receiver.css">
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
</head>
<body>
  <!-- Custom player (replaces cast-media-player) -->
  <div id="monitorr-player" style="display:none">
    <video id="monitorr-video" autoplay></video>
    <div id="meta-overlay">
      <img id="meta-poster" src="" alt="">
      <div id="meta-text">
        <div id="meta-title"></div>
        <div id="meta-subtitle"></div>
      </div>
    </div>
  </div>

  <!-- Idle screen -->
  <div id="monitorr-idle">
    <div class="idle-brand">Monitorr</div>
    <div class="idle-status">Ready to cast</div>
    <div class="idle-version">v0.0.7</div>
  </div>

  <!-- Watermark during playback -->
  <div id="monitorr-watermark">
    <span class="wm-brand">Monitorr</span>
    <span class="wm-ver">v0.0.7</span>
  </div>

  <script src="receiver.js"></script>
</body>
</html>
