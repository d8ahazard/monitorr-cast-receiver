<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Monitorr</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="receiver.css">
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"></script>
</head>
<body>
  <video id="mr-video" playsinline></video>

  <div id="mr-app">
    <!-- Idle screen: shown when nothing is playing -->
    <div id="mr-idle" class="mr-overlay">
      <div class="mr-idle-logo">M</div>
      <div class="mr-idle-title">Monitorr</div>
    </div>

    <!-- Loading overlay: spinner + title during load/seek -->
    <div id="mr-loading" class="mr-overlay">
      <div class="mr-spinner"></div>
      <div id="mr-loading-title" class="mr-loading-text"></div>
      <div id="mr-loading-sub" class="mr-loading-subtext"></div>
    </div>

    <!-- Transport bar: bottom controls during playback -->
    <div id="mr-transport">
      <div class="mr-transport-meta">
        <img id="mr-poster" class="mr-poster" src="" alt="">
        <div class="mr-meta-text">
          <div id="mr-title" class="mr-title"></div>
          <div id="mr-subtitle" class="mr-subtitle"></div>
        </div>
      </div>

      <div class="mr-transport-progress">
        <span id="mr-time-current" class="mr-time">0:00</span>
        <div id="mr-progress-bar" class="mr-progress-bar">
          <div id="mr-progress-buffered" class="mr-progress-buffered"></div>
          <div id="mr-progress-played" class="mr-progress-played"></div>
          <div id="mr-progress-seek" class="mr-progress-seek"></div>
        </div>
        <span id="mr-time-duration" class="mr-time">0:00</span>
      </div>

      <div class="mr-transport-controls">
        <button id="mr-btn-prev" class="mr-btn mr-btn-skip" title="Previous episode">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="mr-btn-rw" class="mr-btn" title="Back 30s">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="12" y="15.5" text-anchor="middle" font-size="7" font-weight="700" font-family="Inter,sans-serif">30</text></svg>
        </button>
        <button id="mr-btn-playpause" class="mr-btn mr-btn-main" title="Play / Pause">
          <svg id="mr-icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="mr-icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="mr-btn-ff" class="mr-btn" title="Forward 30s">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="12" y="15.5" text-anchor="middle" font-size="7" font-weight="700" font-family="Inter,sans-serif">30</text></svg>
        </button>
        <button id="mr-btn-next" class="mr-btn mr-btn-skip" title="Next episode">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button id="mr-btn-cc" class="mr-btn mr-btn-cc" title="Subtitles">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 7H9.5v-.5h-2v3h2V13H11v1c0 .55-.45 1-1 1H7c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1h3c.55 0 1 .45 1 1v1zm7 0h-1.5v-.5h-2v3h2V13H18v1c0 .55-.45 1-1 1h-3c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1h3c.55 0 1 .45 1 1v1z"/></svg>
        </button>
      </div>
    </div>

    <!-- Toast banner -->
    <div id="mr-toast" class="mr-toast"></div>
  </div>

  <script src="receiver.js"></script>
</body>
</html>
